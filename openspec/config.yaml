project: job-tracker
version: 0.1.0
stack:
  runtime: node-20
  language: typescript
  package_manager: pnpm
  framework: express-5
  orm: prisma-7
  database: postgres-16
  testing: vitest
  linting: eslint-prettier
  containerization: docker-compose
strict_tdd: true
persistence: openspec
conventions:
  api_versioning: v1
  module_system: esm
  validation: zid
  cli_framework: commander
environments:
  local:
    database: postgres://localhost:5432
    server: http://localhost:3000
  docker:
    database: postgres://db:5432
    server: http://localhost:3000
  production:
    database: "${DATABASE_URL}"
    server: "${SERVER_URL}"
testing:
  runner: vitest
  coverage_tool: v8
  layers:
    - unit
    - integration
    - e2e
  thresholds:
    statements: 80
    branches: 70
    functions: 80
    lines: 80
